events {
    worker_connections 1024;
}

http {
    upstream web {
        server web-frontend:4321;
    }

    upstream api {
        server api-server:3000;
    }

    # HTTP server - redirect to HTTPS + serve ACME challenge
    server {
        listen 80;
        server_name adisai.xyz www.adisai.xyz;

        # Let's Encrypt ACME challenge (untuk certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect semua HTTP ke HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name adisai.xyz www.adisai.xyz;

        ssl_certificate /etc/letsencrypt/live/adisai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/adisai.xyz/privkey.pem;

        # Main web frontend
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API routes
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://api/health;
            proxy_set_header Host $host;
        }
    }
}

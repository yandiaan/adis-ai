events {
    worker_connections 1024;
}

http {

    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 250m;

    ####################################
    # HTTP SERVER
    ####################################
    server {
        listen 80;
        server_name adisai.xyz www.adisai.xyz;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    ####################################
    # HTTPS SERVER
    ####################################
    server {
        listen 443 ssl http2;
        server_name adisai.xyz www.adisai.xyz;

        ssl_certificate /etc/letsencrypt/live/adisai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/adisai.xyz/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        ####################################
        # Frontend
        ####################################
        location / {

            proxy_pass http://penginfo-web-frontend:4321;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        ####################################
        # API
        ####################################
        location /api/ {

            proxy_pass http://penginfo-api-server:3000;

            proxy_http_version 1.1;
            proxy_buffering off;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        ####################################
        # Uploads
        ####################################
        location /uploads/ {

            proxy_pass http://penginfo-api-server:3000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        ####################################
        # Health check
        ####################################
        location = /health {

            proxy_pass http://penginfo-api-server:3000/health;

            proxy_set_header Host $host;
        }

        ####################################
        # Certbot challenge
        ####################################
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }
}